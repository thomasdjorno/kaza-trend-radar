# /etc/nginx/sites-available/trends.maisonkaza.fr
# ln -s /etc/nginx/sites-available/trends.maisonkaza.fr /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name trends.maisonkaza.fr;

    # Redirection HTTPS (certbot renseignera le bloc 443 automatiquement).
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name trends.maisonkaza.fr;

    # ssl_certificate     /etc/letsencrypt/live/trends.maisonkaza.fr/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/trends.maisonkaza.fr/privkey.pem;

    client_max_body_size 5m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
